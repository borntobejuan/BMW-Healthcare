version: "3.9"

# ─── Uso ────────────────────────────────────────────────────────────────────────
#
#  PC (Windows/Mac/Linux con Docker Desktop):
#    docker compose up -d
#
#  Raspberry Pi (mismo fichero, distinto .env):
#    Cambia INFLUX_HOST en .env a http://<ip-de-la-rpi>:8086
#    docker compose up -d
#
#  La única diferencia real entre PC y RPi es la IP en .env.
#  En RPi también puedes añadir --network host si hay problemas de red.
# ────────────────────────────────────────────────────────────────────────────────

services:

  # ── InfluxDB 2.x ─────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: bmw_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    admin
      DOCKER_INFLUXDB_INIT_PASSWORD:    adminadmin   # mínimo 8 chars
      DOCKER_INFLUXDB_INIT_ORG:         ${INFLUX_ORG:-bmw}
      DOCKER_INFLUXDB_INIT_BUCKET:      ${INFLUX_BUCKET:-e87}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-bmw-local-token-changeme}
      DOCKER_INFLUXDB_INIT_RETENTION:   30d           # datos de 30 días
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: bmw_grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      # Permite que Grafana cargue los datasources y dashboards automáticamente
      GF_PATHS_PROVISIONING:      /etc/grafana/provisioning
      # Refresco mínimo: 1s (dashboards en "tiempo real")
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 1s
      # Variable de entorno para el datasource (apunta a InfluxDB)
      INFLUX_TOKEN: ${INFLUX_TOKEN:-bmw-local-token-changeme}
      INFLUX_ORG:   ${INFLUX_ORG:-bmw}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-e87}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  influxdb_data:
  influxdb_config:
  grafana_data:
